# ──────────────────────────────────────────────
# Terminal & Core
# ──────────────────────────────────────────────

set-option -g default-terminal 'tmux-256color'
set-option -sa terminal-overrides ',xterm-256color:RGB'
set-option -sa terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set-option -sa terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set-option -sg escape-time 0
set-option -g repeat-time 600
set-option -g history-limit 50000
set-option -g focus-events on
set-option -g mouse on
set-option -g set-clipboard on
set-option -g aggressive-resize on

# ──────────────────────────────────────────────
# Prefix
# ──────────────────────────────────────────────

unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# ──────────────────────────────────────────────
# Indexing
# ──────────────────────────────────────────────

set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# ──────────────────────────────────────────────
# Vi Mode & Copy
# ──────────────────────────────────────────────

set-window-option -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ──────────────────────────────────────────────
# Pane Navigation
# ──────────────────────────────────────────────

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ──────────────────────────────────────────────
# Window & Pane Management
# ──────────────────────────────────────────────

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"
bind Tab last-window
bind > swap-pane -D
bind < swap-pane -U
bind x kill-pane

# ──────────────────────────────────────────────
# Session Management
# ──────────────────────────────────────────────

bind f display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs tmux switch-client -t"
bind w display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf --reverse | cut -d' ' -f1 | xargs tmux switch-client -t"

# ──────────────────────────────────────────────
# Status Bar
# ──────────────────────────────────────────────

set-option -g status-position top
set-option -g status-style 'bg=#282634 fg=#F8F8F2'
set-option -g status-left-length 40
set-option -g status-right-length 40

# Left: session name pill
set-option -g status-left '\
#[fg=#282634 bg=#AE81FF bold] #S \
#[fg=#AE81FF bg=#282634]'

# Right: time pill
set-option -g status-right '\
#[fg=#322f3f]#[fg=#BFBFBF bg=#322f3f] %H:%M \
#[fg=#322f3f bg=#282634]'

# Active window tab
set-option -g window-status-current-format '\
#[fg=#C5A3FF bg=#282634]\
#[fg=#282634 bg=#C5A3FF bold] #I:#W \
#[fg=#C5A3FF bg=#282634]'

# Inactive window tab
set-option -g window-status-format '\
#[fg=#8077A8 bg=#282634]\
#[fg=#F8F8F2 bg=#8077A8] #I:#W \
#[fg=#8077A8 bg=#282634]'

# Pane border
set-option -g pane-border-style 'fg=#322f3f'
set-option -g pane-active-border-style 'fg=#C5A3FF'
set-option -g message-style 'bg=#8077A8 fg=#F8F8F2 bold'
set-option -g message-command-style 'bg=#322f3f fg=#F8F8F2'
set-option -g mode-style 'bg=#8077A8 fg=#F8F8F2'
set-option -g window-status-separator ''

# ──────────────────────────────────────────────
# Plugins
# ──────────────────────────────────────────────

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'

# ──────────────────────────────────────────────
# Plugin Configuration
# ──────────────────────────────────────────────

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

set -g @floax-bind '-n M-p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#8077A8'

run '~/.tmux/plugins/tpm/tpm'
